name: "Verify Repo Tags"

on:
  workflow_dispatch: {}
  schedule:
    - cron:  '00 10 * * 1-5' # Runs at 10:00 UTC, Monday through Friday.

jobs:
  verify-repo-tags:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup ruby
        uses: ruby/setup-ruby@97ecb7b512899eb71ab1bf2310a624c6f1589ac6 # v1.308.0
        with:
          bundler-cache: true

      - name: Verify Repo Tags
        id: verify_repo_tags
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          EXIT_CODE=0
          output=$(bundle exec rake verify_repo_tags) || EXIT_CODE=$?

          echo "$output"

          exit $EXIT_CODE

      - name: Notify failure
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        if: ${{ failure() }}
        with:
          payload: |
            {
              "channel": "#govuk-platform-support",
              "username": "Platform Alerts",
              "text": "The <https://github.com/alphagov/govuk-developer-docs/blob/main/data/repos.yml|Developer Docs repo list> is out of sync with the repos tagged as 'govuk' in GitHub.",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "The <https://github.com/alphagov/govuk-developer-docs/blob/main/data/repos.yml|Developer Docs repo list> is out of sync with the repos tagged as 'govuk' in GitHub. <https://docs.google.com/document/d/12W_OiSSH-cs_MTzBwT66anRDFDOwmx-7RKF_U0u9vVM/edit?tab=t.0#heading=h.ddohqbdt0uqc|See the runbook>"
                  },
                  "accessory": {
                    "type": "button",
                    "text": {
                        "type": "plain_text",
                        "text": "Check the build logs for details"
                    },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "action_id": "button-view-workflow"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
